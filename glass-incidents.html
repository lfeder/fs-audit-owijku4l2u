<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Glass / Brittle Plastic Warnings — FS Audit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="audit-core.js"></script>
<script src="audit-list.js"></script>
<link rel="stylesheet" href="audit-list.css">
</head>
<body>
<div id="root"></div>
<script>
function dateOnly(v){ if(!v) return null; const s=String(v);
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  m=s.match(/^(\d{4}-\d{2}-\d{2})/); return m?m[1]:null;
}
FSAudit.renderIssueList({
  title: 'Glass / brittle plastic warnings unresolved',
  version: '04-29 07:25',
  defaultSort: { key: 'checked_date', dir: -1 },
  columns: [
    { key: 'checked_date',  label: 'Checked' },
    { key: 'farm',          label: 'Farm' },
    { key: 'warning',       label: 'Warning' },
    { key: 'action',        label: 'Action required' },
    { key: 'reported_by',   label: 'Reported by' },
  ],
  fetchRows: async (win) => {
    const rows = await FSAudit.fetchSheet('fsafe', 'fsafe_log_glass');
    const out = [];
    rows.forEach(r => {
      const checked = dateOnly(r['Checked Date']);
      if (!checked || checked < win.from || checked > win.to) return;
      const warn = String(r.Warning || '').trim();
      if (!warn) return;
      if (r['Verified Time'] && String(r['Verified Time']).trim() !== '') return;
      out.push({
        checked_date: checked,
        farm: r.Farm,
        warning: r.Warning,
        action: r['Action Required'],
        reported_by: r['Reported By'],
      });
    });
    return out;
  },
});
</script>
</body>
</html>
