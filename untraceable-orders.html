<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Untraceable Orders — FS Audit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="audit-core.js"></script>
<script src="audit-list.js"></script>
<link rel="stylesheet" href="audit-list.css">
</head>
<body>
<div id="root"></div>
<script>
function dateOnly(v){ if(!v) return null; const s=String(v);
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  m=s.match(/^(\d{4}-\d{2}-\d{2})/); return m?m[1]:null;
}
FSAudit.renderIssueList({
  title: 'Sales orders that cannot be traced back to a harvest / seeding',
  version: '04-29 09:50',
  defaultSort: { key: 'invoice_date', dir: -1 },
  columns: [
    { key: 'invoice_date',     label: 'Invoice date' },
    { key: 'farm',             label: 'Farm' },
    { key: 'customer',         label: 'Customer' },
    { key: 'po_number',        label: 'PO #' },
    { key: 'product_code',     label: 'Product' },
    { key: 'invoice_quantity', label: 'Qty', num: true },
    { key: 'pack_keys',        label: 'PackDates / PackLots' },
    { key: 'reason',           label: 'Reason' },
  ],
  fetchRows: async (win) => {
    const [sales, cukeHarv, lettSeed] = await Promise.all([
      FSAudit.fetchSheet('sales', 'sales_po'),
      FSAudit.fetchSheet('grow',  'grow_C_harvest'),
      FSAudit.fetchSheet('grow',  'grow_L_seeding'),
    ]);
    const cukeDates = new Set();
    cukeHarv.forEach(r => { const d = dateOnly(r.HarvestDate); if (d) cukeDates.add(d); });
    const lettLots = new Set();
    lettSeed.forEach(r => {
      String(r.packlot||'').split(',').forEach(s => {
        const v = s.trim().replace(/\$$/, '');
        if (v) lettLots.add(v);
      });
    });
    const out = [];
    sales.forEach(r => {
      const inv = dateOnly(r.InvoiceDate); if (!inv || inv < win.from || inv > win.to) return;
      const qty = Number(r.InvoiceQuantity); if (!qty) return;
      const farm = String(r.Farm||'').toLowerCase();
      const splits = [];
      for (let i = 1; i <= 6; i++) {
        const n = String(i).padStart(2,'0');
        const pd = r['PackDate'+n], pq = r['Quantity'+n], pl = r['PackLot'+n];
        const hasQty = pq != null && String(pq).trim() !== '' && Number(pq) !== 0;
        const hasLot = pl && String(pl).trim() !== '';
        if (!hasQty && !hasLot) continue;
        splits.push({ pack_date: dateOnly(pd), pack_lot: String(pl||'').trim().replace(/\$$/, '') });
      }
      if (splits.length === 0) return;
      let anyResolved = false, packKeys = '';
      if (farm === 'cuke') {
        anyResolved = splits.some(s => s.pack_date && cukeDates.has(s.pack_date));
        packKeys = splits.map(s => s.pack_date).filter(Boolean).join(', ');
      } else if (farm === 'lettuce') {
        anyResolved = splits.some(s => s.pack_lot && lettLots.has(s.pack_lot));
        packKeys = splits.map(s => s.pack_lot).filter(Boolean).join(', ');
      } else {
        return;
      }
      if (anyResolved) return;
      out.push({
        invoice_date: inv,
        farm: r.Farm,
        customer: r.CustomerName,
        po_number: r.PurchaseOrderNumber,
        product_code: r.ProductCode,
        invoice_quantity: qty,
        pack_keys: packKeys || '(none)',
        reason: farm === 'cuke'
          ? 'No grow_C_harvest row on any of the PackDate##'
          : 'No grow_L_seeding row matching any PackLot##',
      });
    });
    return out;
  },
});
</script>
</body>
</html>
