<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesticide Posting QR Code</title>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1c2330;
         display: flex; flex-direction: column; align-items: center; padding: 32px 20px; }
  #version { position: fixed; top: 12px; right: 16px; font-size: 0.8rem; color: #1c2330; }
  h1 { font-size: 1.4rem; text-align: center; }
  .sub { color: #5a6472; font-size: 0.95rem; margin: 8px 0 20px; text-align: center; max-width: 460px; }
  .card { border: 2px solid #16613e; border-radius: 16px; padding: 28px; text-align: center; }
  .card .qr { display: flex; justify-content: center; }
  .card .cap { font-size: 1rem; font-weight: 700; margin-top: 14px; color: #16613e; }
  .url { font-size: 0.78rem; color: #8a929e; word-break: break-all; margin-top: 10px; max-width: 320px; }
  .toolbar { margin: 22px 0; }
  .toolbar button { font-size: 0.95rem; padding: 8px 18px; border: 1px solid #16613e; background: #16613e; color: #fff; border-radius: 6px; cursor: pointer; }
  @media print { .toolbar, .sub, #version { display: none; } }
</style>
</head>
<body>
<div id="version">05-19 22:10</div>
<h1>Pesticide Application Postings</h1>
<div class="sub">Post this one code at the farm entrance. Scanning it opens a greenhouse picker — workers tap their house to see the last 30 days of applications and whether it's safe to enter.</div>
<div class="toolbar"><button onclick="window.print()">Print</button></div>

<div class="card">
  <div class="qr" id="qr"></div>
  <div class="cap">Scan for pesticide application notices</div>
  <div class="url" id="url"></div>
</div>

<script>
const url = location.href.replace(/spray-posting-qr\.html.*$/, 'spray-posting.html');
document.getElementById('url').textContent = url;
new QRCode(document.getElementById('qr'), { text: url, width: 300, height: 300, correctLevel: QRCode.CorrectLevel.M });
</script>
</body>
</html>
