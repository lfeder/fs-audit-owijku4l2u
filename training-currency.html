<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Training Currency — FS Audit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="audit-core.js"></script>
<script src="audit-list.js"></script>
<link rel="stylesheet" href="audit-list.css">
</head>
<body>
<div id="root"></div>
<script>
function dateOnly(v){ if(!v) return null; const s=String(v);
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  m=s.match(/^(\d{4}-\d{2}-\d{2})/); return m?m[1]:null;
}
FSAudit.renderIssueList({
  title: 'Active employees — days since last food-safety training',
  version: '04-29 15:35',
  defaultSort: { key: 'days_since', dir: -1 },
  columns: [
    { key: 'name',         label: 'Employee' },
    { key: 'department',   label: 'Dept' },
    { key: 'status',       label: 'Status' },
    { key: 'start_date',   label: 'Start date' },
    { key: 'last_signed',  label: 'Last training' },
    { key: 'days_since',   label: 'Days since', num: true },
    { key: 'last_training',label: 'Topic' },
  ],
  fetchRows: async (win) => {
    const [register, trainings] = await Promise.all([
      FSAudit.fetchSheet('hr',    'hr_ee_register'),
      FSAudit.fetchSheet('fsafe', 'fsafe_log_training_employees'),
    ]);
    // Build last-training-per-employee from training records
    const byEmp = {};
    trainings.forEach(r => {
      const sig = dateOnly(r.DigitalSignatureDateTime || r.TrainingDateTime);
      if (!sig) return;
      const name = String(r.FullName || '').trim().toUpperCase();
      if (!name) return;
      if (!byEmp[name] || byEmp[name].sig < sig) {
        byEmp[name] = { sig, training: r.TrainingType };
      }
    });
    const today = new Date().toISOString().slice(0, 10);
    // Active employees only — IsActive=TRUE
    const out = [];
    register.forEach(e => {
      const isActive = String(e.IsActive || '').toLowerCase() === 'true';
      if (!isActive) return;
      const name = String(e.FullName || '').trim();
      if (!name) return;
      const info = byEmp[name.toUpperCase()];
      const startDate = dateOnly(e.StartDate);
      out.push({
        name,
        department: e.Department || '',
        status: e.Status || '',
        start_date: startDate || '',
        last_signed: info ? info.sig : '(none on record)',
        days_since: info
          ? Math.floor((new Date(today) - new Date(info.sig)) / 86400000)
          : (startDate
              ? Math.floor((new Date(today) - new Date(startDate)) / 86400000)
              : null),
        last_training: info ? info.training : '',
      });
    });
    return out;
  },
});
</script>
</body>
</html>
